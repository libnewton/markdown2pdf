# GitLab Pages deploy for md2pdf.
# The web app lives in web/ (static SvelteKit, adapter-static). Its build
# output (web/build) is renamed to public/ so GitLab Pages picks it up.

stages:
  - build

# Cache node_modules across runs to keep builds fast.
# Tied to the lockfile hash so dep changes invalidate it automatically.
.node_cache: &node_cache
  key:
    files:
      - web/package-lock.json
  paths:
    - web/.npm/
    - web/node_modules/
  policy: pull-push

pages:
  stage: build
  image: node:20-alpine
  cache:
    <<: *node_cache
  script:
    # The Vite plugins copy the md2pdf package + fonts from the repo (no
    # network, no Rust) — engine.wasm is committed, so a plain npm build works.
    - cd web
    - npm ci --cache .npm --prefer-offline
    - npm run build
    - mv build ../public
  artifacts:
    paths:
      - public
    expire_in: 1 week
  rules:
    # Only publish from the default branch.
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
